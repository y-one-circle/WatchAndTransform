<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Watch&Transform</title>

  <!-- favicon -->
  <link rel="icon" href="/akabeko.ico">
</head>
<body>

<h1>Watch&Transform</h1>

<img id="loading" src="/images/sample.gif" alt="loading">

<div>
  <label>endfileFolderPath</label>
  <input id="endfileFolderPath">
</div>

<div>
  <label>txtFolderPath</label>
  <input id="txtFolderPath">
</div>

<div>
  <label>tempFolderPath</label>
  <input id="tempFolderPath">
</div>

<div>
  <label>returnCode</label>
  <input id="returnCode">
</div>

<button onclick="execute()">実行</button>

<script>
async function execute() {
  // 処理中GIF表示
  document.getElementById("loading").style.display = "block";

  const body = {
    endfileFolderPath: document.getElementById("endfileFolderPath").value,
    txtFolderPath: document.getElementById("txtFolderPath").value,
    tempFolderPath: document.getElementById("tempFolderPath").value,
    returnCode: document.getElementById("returnCode").value
  };

  try {
    const res = await fetch("/api/wx/execute", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });

    const text = await res.text();
    alert(text);
  } catch (e) {
    alert("エラーが発生しました");
  } finally {
    document.getElementById("loading").style.display = "none";
  }
}
</script>

</body>
</html>
